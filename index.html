<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyPet Language Learning</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>🌎 PolyPet Language Learning</h1>
<p>Learn languages while leveling up your pet!</p>
</header>

<nav>
<a href="#flashcards">Flashcards</a>
<a href="#quiz">Quiz</a>
<a href="#map">Language Map</a>
</nav>

<section id="pet-section">

<h2>Your PolyPet</h2>

<div id="pet">🐣</div>

<p>Level: <span id="level">1</span></p>
<p>XP: <span id="xp">0</span></p>

</section>

<section id="flashcards">

<h2>Vocabulary Flashcards</h2>

<div id="flashcard" class="card">
<span id="word">Hola</span>
</div>

<button onclick="flipCard()">Flip</button>
<button onclick="nextCard()">Next Word</button>

</section>

<section id="quiz">

<h2>Mini Quiz</h2>

<p id="question">Translate: Hola</p>

<button onclick="answer('Hello')">Hello</button>
<button onclick="answer('Bye')">Bye</button>
<button onclick="answer('Food')">Food</button>

<p id="result"></p>

</section>

<section id="map">

<h2>🌎 Choose a Language by Country</h2>

<p>Click the map to explore a language.</p>

<div class="map-container">

<img 
src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
id="worldMap"
alt="World Map">

</div>

<div id="languageOutput"></div>

</section>

<script src="script.js"></script>

</body>
</html>
