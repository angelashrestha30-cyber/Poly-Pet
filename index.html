<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PolyPet Language Learning</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar">

<div class="logo">🐾 PolyPet</div>

<div class="nav-links">
<a onclick="scrollToSection('home')">Home</a>
<a onclick="scrollToSection('lessons')">Lessons</a>
<a onclick="scrollToSection('game')">Game</a>
<a onclick="scrollToSection('map')">Language Map</a>
<a onclick="scrollToSection('shop')">Pet Shop</a>
</div>

</nav>

<section id="home" class="hero">

<div class="pet-panel glass">

<div class="pet-avatar">🦊</div>

<h3 id="pet-name-display">Pika</h3>

<p>Level <span id="level">1</span></p>

<div class="xp-bar">
<div id="xp-fill"></div>
</div>

<button onclick="completeLesson()">Complete Lesson</button>

</div>

</section>

<section id="lessons" class="section glass">

<h2>🧠 AI Lesson Generator</h2>

<button onclick="generateLesson()">Generate Lesson</button>

<div id="lessonOutput"></div>

</section>

<section id="game" class="section glass">

<h2>🎮 Pet Mini Game</h2>

<button onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<p>Score: <span id="gameScore">0</span></p>

</section>

<section id="map" class="section glass">

<h2>🌎 Choose a Language</h2>

<img
src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
id="worldMap">

<div id="languageOutput"></div>

</section>

<section id="shop" class="section glass">

<h2>🎨 Pet Customization Shop</h2>

<button onclick="buyItem('hat')">🎩 Hat (50 XP)</button> <button onclick="buyItem('glasses')">🕶 Glasses (40 XP)</button> <button onclick="buyItem('crown')">👑 Crown (100 XP)</button>

</section>

<script src="js/script.js"></script>

</body>
</html>
